services:
  postgres:
    image: postgres:16-alpine
    container_name: amsr_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: amsr_db
      POSTGRES_USER: amsr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - amsr_postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amsr_user -d amsr_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: amsr_backend_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://amsr_user:${POSTGRES_PASSWORD}@postgres:5432/amsr_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: amsr_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - proxy_net

volumes:
  amsr_postgres_data:

networks:
  internal:
    driver: bridge
  proxy_net:
    external: true
