name: Deploy AMSR

on:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (test)
        run: docker build -f backend/Dockerfile.prod -t amsr-backend-ci ./backend

      - name: Build frontend image (test)
        run: docker build -f frontend/Dockerfile.prod -t amsr-frontend-ci ./frontend

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build web app
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Sync Capacitor assets
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build APK (debug)
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p apk-output
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk apk-output/amsr-steg.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amsr-apk
          path: apk-output/amsr-steg.apk
          retention-days: 30

  deploy:
    needs: [test-build, build-apk]
    if: always() && needs.test-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: amsr-apk
          path: apk-output
        continue-on-error: true

      - name: Deploy web app over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            cd /opt/steg/AMSR
            git pull origin main
            mkdir -p downloads
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            sleep 5
            docker exec amsr_backend_prod node prisma/seed.js
            docker image prune -f

      - name: Upload APK via SCP natif
        if: hashFiles('apk-output/amsr-steg.apk') != ''
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          PORT=${VPS_PORT:-22}
          OPTS="-i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -p $PORT"
          ssh $OPTS $VPS_USER@$VPS_HOST "mkdir -p /opt/steg/AMSR/downloads"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -P $PORT \
            apk-output/amsr-steg.apk \
            $VPS_USER@$VPS_HOST:/opt/steg/AMSR/downloads/amsr-steg.apk
          rm -f /tmp/deploy_key
