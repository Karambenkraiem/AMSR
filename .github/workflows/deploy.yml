name: Deploy AMSR

on:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (test)
        run: docker build -f backend/Dockerfile.prod -t amsr-backend-ci ./backend

      - name: Build frontend image (test)
        run: docker build -f frontend/Dockerfile.prod -t amsr-frontend-ci ./frontend

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build web app
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Sync Capacitor assets
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build APK (debug)
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p apk-output
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk apk-output/amsr-steg.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amsr-apk
          path: apk-output/amsr-steg.apk
          retention-days: 30

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: android-latest
          name: AMSR Android (build auto)
          body: |
            Build automatique depuis le commit ${{ github.sha }}.
            APK non signée (debug) — activez "Sources inconnues" pour l'installer.
          make_latest: true
          files: apk-output/amsr-steg.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [test-build, build-apk]
    if: always() && needs.test-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy web app over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/steg/AMSR
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f
